<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serene Bay — Ocean Photography & Literary Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #faf9f6; color: #1c2d37; }
        .serif-title { font-family: 'Cinzel', serif; }
        .serif-body { font-family: 'Playfair Display', serif; }
        /* Loading skeleton effect */
        .skeleton { background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between selection:bg-cyan-100">

    <nav class="border-b border-stone-200/60 bg-white/70 backdrop-blur-md sticky top-0 z-40 px-6 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="index.html" class="serif-title tracking-widest text-xl font-medium text-stone-800">SERENE BAY</a>
            <div class="flex items-center space-x-8 text-sm tracking-wider uppercase font-medium text-stone-600">
                <a href="#" class="hover:text-cyan-700 transition-colors">Journal</a>
                <a href="#" class="hover:text-cyan-700 transition-colors">Gallery</a>
                <a href="editor.html" class="text-xs text-stone-400 hover:text-stone-600 tracking-widest transition-all">Studio login</a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-12 lg:py-20 w-full grid grid-cols-1 lg:grid-cols-12 gap-16">
        
        <div class="lg:col-span-7 space-y-4">
            <div class="overflow-hidden bg-stone-100 rounded-lg shadow-xl shadow-stone-200/50 aspect-[4/5]">
                <img id="view-image" src="" alt="Ocean Fine Art" class="w-full h-full object-cover hidden transition-opacity duration-700 opacity-0">
                <div id="image-loader" class="w-full h-full skeleton"></div>
            </div>
            <p id="view-caption" class="text-xs italic text-stone-500 tracking-wide text-right font-light font-serif h-4 w-1/2 ml-auto rounded"></p>
        </div>

        <div class="lg:col-span-5 flex flex-col justify-center space-y-8">
            <div class="space-y-3">
                <div class="flex items-center space-x-3 text-xs tracking-widest uppercase font-medium text-cyan-800">
                    <span id="view-category" class="inline-block min-w-[50px]"></span>
                    <span class="w-1.5 h-1.5 rounded-full bg-cyan-700/40"></span>
                    <span id="view-date" class="inline-block min-w-[80px]"></span>
                </div>
                <h1 id="view-title" class="serif-body text-4xl lg:text-5xl leading-tight font-medium text-stone-900 tracking-tight"></h1>
            </div>

            <div id="view-body" class="serif-body text-stone-700 space-y-6 leading-relaxed text-lg italic"></div>
            
            <div class="pt-4 border-t border-stone-200/80">
                <p class="text-xs uppercase tracking-widest text-stone-400 font-semibold">Author</p>
                <p class="text-sm font-medium text-stone-700 mt-1">Evelyn Vance</p>
            </div>
        </div>
    </main>

    <footer class="border-t border-stone-200/60 bg-white py-8 px-6 text-center text-xs tracking-widest text-stone-400 uppercase font-medium">
        &copy; 2026 Serene Bay. Built for Pure Aesthetics & Literary Thought.
    </footer>

    <script>
        // Paste your personal Supabase Credentials inside these quotes!
        const SUPABASE_URL = "YOUR_SUPABASE_URL";
        const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function fetchJournalPost() {
            // Pulls the latest single post row entry from your cloud database
            let { data: posts, error } = await supabase
                .from('posts')
                .select('*')
                .order('id', { ascending: false })
                .limit(1);

            if (error) {
                console.error("Database connection issue: ", error);
                return;
            }

            if (posts && posts.length > 0) {
                const post = posts[0];
                
                // Populating data seamlessly
                document.getElementById('view-title').innerText = post.title;
                document.getElementById('view-category').innerText = post.category;
                document.getElementById('view-caption').innerText = post.caption;
                document.getElementById('view-date').innerText = post.date_string;
                document.getElementById('view-body').innerHTML = post.body_html;
                
                const imgElement = document.getElementById('view-image');
                imgElement.src = post.image_url;
                imgElement.onload = () => {
                    imgElement.classList.remove('hidden');
                    setTimeout(() => imgElement.classList.add('opacity-100'), 50);
                    document.getElementById('image-loader').classList.add('hidden');
                };
            }
        }

        if(SUPABASE_URL !== "YOUR_SUPABASE_URL") {
            fetchJournalPost();
        } else {
            document.getElementById('view-title').innerText = "Database Connection Needed";
            document.getElementById('view-body').innerHTML = "<p>Please check the README file to connect your free database and start publishing.</p>";
        }
    </script>
</body>
</html>
